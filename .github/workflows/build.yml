name: Compila Java 25 per High Sierra

on:
  workflow_dispatch:

jobs:
  build-java:
    runs-on: macos-latest

    steps:
      - name: Scarica sorgenti OpenJDK 25
        run: |
          git clone --depth 1 https://github.com/openjdk/jdk.git
          echo "Sorgenti scaricati con successo."

      - name: Installa dipendenze (Homebrew)
        run: |
          brew install autoconf freetype

      - name: Applica patch flag di compilazione
        run: |
          cd jdk
          # Modifica i file m4 per forzare la compatibilita con i vecchi sistemi ed evitare stack check
          sed -i '' 's/-mmacosx-version-min=\$[{]MACOSX_VERSION_MIN[}]/-mmacosx-version-min=10.13 -fno-stack-check/g' make/autoconf/flags-cflags.m4
          sed -i '' 's/MACOSX_VERSION_MIN=.*/MACOSX_VERSION_MIN=10.13/g' make/autoconf/flags.m4
          echo "Patch applicata con successo."

      - name: Configura (./configure)
        run: |
          cd jdk
          # Configurazione pulita forzata per Mac Intel x86_64
          bash configure \
            --openjdk-target=x86_64-apple-darwin \
            --with-boot-jdk=$JAVA_HOME \
            --disable-warnings-as-errors \
            --with-debug-level=release
        env:
          MACOSX_DEPLOYMENT_TARGET: "10.13"

      - name: Compila (make images)
        run: |
          cd jdk
          make images
        env:
          MACOSX_DEPLOYMENT_TARGET: "10.13"

      - name: Carica artefatto JDK
        uses: actions/upload-artifact@v4
        with:
          name: java-25-high-sierra
          path: jdk/build/*/images/jdk
          retention-days: 7
